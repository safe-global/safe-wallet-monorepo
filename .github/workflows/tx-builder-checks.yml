name: tx-builder Checks

on:
  pull_request:
    paths:
      - apps/tx-builder/**
      - packages/**
  push:
    branches:
      - main
      - dev
    paths:
      - apps/tx-builder/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Run ESLint
        run: yarn workspace @safe-global/tx-builder lint

  prettier:
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Run Prettier check
        run: yarn workspace @safe-global/tx-builder prettier

  type-check:
    permissions:
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Type check
        run: yarn workspace @safe-global/tx-builder type-check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Run unit tests
        run: yarn workspace @safe-global/tx-builder test --ci --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          flags: tx-builder
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Build
        run: yarn workspace @safe-global/tx-builder build
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tx-builder-build
          path: apps/tx-builder/build
          retention-days: 7
