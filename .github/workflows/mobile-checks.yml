name: Mobile Checks

on:
  pull_request:
    paths:
      - apps/mobile/**
      - packages/**
  push:
    branches:
      - main
      - dev
    paths:
      - apps/mobile/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Run lint
        run: yarn workspace @safe-global/mobile lint

  prettier:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Run Prettier check
        run: yarn workspace @safe-global/mobile prettier

  type-check:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: ./.github/actions/yarn
      - name: Type check
        run: yarn workspace @safe-global/mobile type-check
