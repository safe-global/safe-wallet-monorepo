name: Mobile Checks

on:
  pull_request:
    paths:
      - apps/mobile/**
      - packages/**
  push:
    branches:
      - main
      - dev
    paths:
      - apps/mobile/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          after-install: 'false'
      - name: Run lint
        run: yarn workspace @safe-global/mobile lint

  prettier:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          after-install: 'false'
      - name: Run Prettier check
        run: yarn workspace @safe-global/mobile prettier

  type-check:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          after-install: 'false'
      - name: Type check
        run: yarn workspace @safe-global/mobile type-check
