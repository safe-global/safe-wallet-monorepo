name: Web Checks

on:
  pull_request:
    paths:
      - apps/web/**
      - packages/**
  push:
    branches:
      - main
      - dev
    paths:
      - apps/web/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Run ESLint with suggestions (PR only)
        if: github.event_name == 'pull_request'
        uses: CatChen/eslint-suggestion-action@e3b70610472590e36e3749cc651eb7805d6040f7 # v4.1.32
        with:
          request-changes: true
          fail-check: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          directory: './'
          targets: '/apps/web/src'
          config-path: './apps/web/eslint.config.mjs'
      - name: Run ESLint (push only)
        if: github.event_name == 'push'
        run: yarn turbo run lint --filter=@safe-global/web

  prettier:
    permissions:
      contents: read
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Run Prettier check
        run: yarn workspace @safe-global/web prettier

  type-check:
    permissions:
      contents: read
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Type check
        run: yarn turbo run type-check --filter=@safe-global/web

  knip-exports:
    permissions:
      contents: read
      checks: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: ./.github/actions/yarn
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Check for unused exports
        run: yarn turbo run knip:exports --filter=@safe-global/web

  notify:
    if: failure() && github.event_name == 'push'
    needs: [lint, prettier, type-check, knip-exports]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_DEV_ALERT }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Web checks failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Web Checks Failed (lint/prettier/type-check)*\n• Branch: `${{ github.ref_name }}`\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• Author: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
