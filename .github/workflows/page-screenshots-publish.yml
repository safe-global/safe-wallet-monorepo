# Publish half of a two-workflow pair. This workflow has write tokens and
# secrets available, so it must only check out the default branch and only
# consume the named artifact produced by the build half (validated below).
# It must not run scripts or local composite actions from a workspace
# populated by a head-ref checkout.
# Companion build workflow: page-screenshots-build.yml.
name: Page Screenshots Publish

on:
  workflow_run:
    workflows: ['Page Screenshots Build']
    types:
      - completed

permissions: {}

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      # Check out the default branch only. The workspace must not contain
      # head-branch contents — the validated artifact is the only thing
      # this workflow consumes from the build half.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: dev
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve, download, and validate artifact
        id: artifact
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            const fs = require('fs')
            const { execSync } = require('child_process')
            const runId = Number(process.env.RUN_ID)

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            })

            // Resolve by ID and require the artifact to belong to this exact
            // workflow_run so a stale or unrelated artifact cannot be picked up.
            const target = artifacts.find(a =>
              a.name === 'page-screenshots' &&
              a.workflow_run.id === runId &&
              !a.expired,
            )

            if (!target) {
              core.notice('No screenshots artifact for this run; nothing to publish')
              core.setOutput('found', 'false')
              return
            }

            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: target.id, // resolve by ID, never by name
              archive_format: 'zip',
            })

            fs.writeFileSync('page-screenshots.zip', Buffer.from(dl.data))
            fs.mkdirSync('page-screenshots', { recursive: true })
            execSync('unzip -o page-screenshots.zip -d page-screenshots', { stdio: 'inherit' })

            // Filename allowlist: `<routeSlug>__<viewport>.png`. Restricts
            // characters to [a-z0-9_] for the slug and one of two known
            // viewports, so filenames render predictably in markdown and
            // map cleanly to filesystem paths.
            const filenameRegex = /^[a-z0-9_]+__(desktop|mobile)\.png$/
            const entries = fs
              .readdirSync('page-screenshots', { withFileTypes: true })
              .filter((e) => e.isFile() && e.name !== '')
              .map((e) => e.name)
            const invalid = entries.filter((f) => !filenameRegex.test(f))
            if (invalid.length > 0) {
              core.setFailed(`Invalid filenames in artifact: ${invalid.join(', ')}`)
              return
            }

            // Cap total uncompressed PNG bytes to avoid runaway artifacts.
            const totalBytes = entries.reduce(
              (sum, f) => sum + fs.statSync(`page-screenshots/${f}`).size,
              0,
            )
            const cap = 50 * 1024 * 1024
            if (totalBytes > cap) {
              core.setFailed(`Artifact exceeds size cap: ${totalBytes} > ${cap}`)
              return
            }

            core.setOutput('found', 'true')
            core.setOutput('count', String(entries.length))

      - name: Resolve PR number
        id: pr
        if: steps.artifact.outputs.found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: headSha,
            })
            const sameRepo = `${context.repo.owner}/${context.repo.repo}`
            const candidates = prs.filter(
              (pr) =>
                pr.state === 'open' &&
                pr.head.sha === headSha &&
                pr.head.repo.full_name === sameRepo,
            )

            if (candidates.length === 0) {
              core.notice(`No open PR found for ${headSha}; PR likely closed since build`)
              core.setOutput('skip', 'true')
              return
            }
            if (candidates.length > 1) {
              core.setFailed(
                `Ambiguous PR resolution: ${candidates.length} candidates for ${headSha}`,
              )
              return
            }

            const pr = candidates[0]
            const { data: current } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            })
            const stale = current.head.sha !== headSha

            core.setOutput('skip', 'false')
            core.setOutput('number', String(pr.number))
            core.setOutput('stale', stale ? 'true' : 'false')

      - name: Upload screenshots to storage branch
        if: steps.artifact.outputs.found == 'true' && steps.pr.outputs.skip == 'false'
        # Local composite action resolved from the `dev` checkout above.
        uses: ./.github/actions/upload-to-storage-branch
        with:
          storage_branch: pr-${{ steps.pr.outputs.number }}-screenshots
          source_dir: page-screenshots
          target_dir: page-screenshots/${{ steps.pr.outputs.number }}
          file_pattern: '*.png'
          commit_message: 'Add page screenshots for PR ${{ steps.pr.outputs.number }}'
          readme_title: 'Page Screenshots Storage'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update PR comment
        if: steps.artifact.outputs.found == 'true' && steps.pr.outputs.skip == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          STALE: ${{ steps.pr.outputs.stale }}
        with:
          script: |
            const fs = require('fs')
            const prNumber = Number(process.env.PR_NUMBER)
            const stale = process.env.STALE === 'true'

            const screenshots = fs
              .readdirSync('page-screenshots')
              .filter((f) => f.endsWith('.png'))
              .sort()

            const { owner, repo } = context.repo
            const storageBranch = `pr-${prNumber}-screenshots`
            const baseUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${storageBranch}/page-screenshots/${prNumber}`

            const slugToLabel = (slug) =>
              slug
                .split('_')
                .filter(Boolean)
                .map((s) => s.charAt(0).toUpperCase() + s.slice(1))
                .join(' ')

            let body = '## 📸 Page Screenshots\n\n'
            if (stale) {
              body +=
                '> **STALE:** The PR was updated after these screenshots were captured. ' +
                'A new run will refresh them.\n\n'
            }
            body += `Found ${screenshots.length} screenshot(s) for pages affected by changes in this PR.\n\n`

            const useCollapsible = screenshots.length >= 8
            for (const file of screenshots) {
              const match = file.match(/^([a-z0-9_]+)__(desktop|mobile)\.png$/)
              const label = match ? `${slugToLabel(match[1])} (${match[2]})` : file
              const imageUrl = `${baseUrl}/${file}`
              if (useCollapsible) {
                body += `<details>\n<summary>${label}</summary>\n\n`
                body += `![${label}](${imageUrl})\n\n`
                body += `</details>\n\n`
              } else {
                body += `### ${label}\n\n`
                body += `![${label}](${imageUrl})\n\n`
              }
            }

            body += '\n---\n'
            body += '*Screenshots are automatically captured from pages affected by changed files.*'

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            })
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('📸 Page Screenshots'),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              })
            }

      - name: Clean up stale comment when no screenshots
        if: steps.artifact.outputs.found != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: headSha,
            })
            const sameRepo = `${context.repo.owner}/${context.repo.repo}`
            const candidates = prs.filter(
              (pr) =>
                pr.state === 'open' &&
                pr.head.sha === headSha &&
                pr.head.repo.full_name === sameRepo,
            )
            if (candidates.length !== 1) {
              return
            }
            const prNumber = candidates[0].number
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('📸 Page Screenshots'),
            )
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              })
            }
