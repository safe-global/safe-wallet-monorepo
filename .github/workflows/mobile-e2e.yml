name: EAS Mobile E2E tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    paths:
      - apps/mobile/**
      - packages/**
      - expo-plugins/**

jobs:
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'mobile-e2e-test')
    name: Install and build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - uses: ./.github/actions/yarn

      - name: Build expo plugins
        run: yarn workspace @safe-global/notification-service-ios build

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # 9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        working-directory: apps/mobile
        run: eas build --profile build-and-maestro-test --non-interactive --no-wait --platform ios
