name: Web Deploy to Dockerhub

on:
  pull_request:
    branches:
      - docker
    paths:
      - apps/web/**
      - packages/**

  push:
    branches:
      - main
      - dev
    paths:
      - apps/web/**
      - packages/**

  release:
    types: [released]

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. web-v1.85.0)'
        required: true
        type: string

permissions: {}

jobs:
  dockerhub-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >-
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/dev' ||
      (github.event_name == 'release' && github.event.action == 'released') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Dockerhub login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Deploy Main
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          tags: safeglobal/safe-wallet-web:staging
          platforms: |
            linux/amd64
            linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy Develop
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          tags: safeglobal/safe-wallet-web:dev
          platforms: |
            linux/amd64
            linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Resolve Docker tag
        if: (github.event_name == 'release' && github.event.action == 'released') || github.event_name == 'workflow_dispatch'
        id: docker_tag
        run: |
          RAW_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Strip app prefix if present (e.g. web-v1.85.0 -> v1.85.0)
          echo "tag=${RAW_TAG#web-}" >> $GITHUB_OUTPUT
      - name: Deploy Tag
        if: (github.event_name == 'release' && github.event.action == 'released') || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          tags: |
            safeglobal/safe-wallet-web:${{ steps.docker_tag.outputs.tag }}
            safeglobal/safe-wallet-web:latest
          platforms: |
            linux/amd64
            linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
