name: Web Smoke tests

on:
  pull_request:
    paths:
      - apps/web/**
      - packages/**
  push:
    branches:
      - main
      - dev
    paths:
      - apps/web/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Cypress Smoke tests
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Split specs across containers
        id: specs
        shell: bash
        run: |
          mapfile -t all_specs < <(ls apps/web/cypress/e2e/smoke/*.cy.js | sort)
          total=${#all_specs[@]}
          container=${{ matrix.containers }}
          num_containers=5
          selected=()
          for (( i=0; i<total; i++ )); do
            if (( (i % num_containers) + 1 == container )); then
              # Convert absolute path to relative from apps/web/
              spec="${all_specs[$i]#apps/web/}"
              selected+=("$spec")
            fi
          done
          echo "specs=$(IFS=,; echo "${selected[*]}")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/cypress
        with:
          secrets: ${{ toJSON(secrets) }}
          spec: ${{ steps.specs.outputs.specs }}
          group: 'Smoke tests'
          tag: 'smoke'
          record: 'false'

  notify:
    if: failure() && github.event_name == 'push'
    needs: [e2e]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_DEV_ALERT }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Web smoke tests failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Web Smoke Tests (E2E) Failed*\n• Branch: `${{ github.ref_name }}`\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• Author: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
