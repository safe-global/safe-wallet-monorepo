name: Mobile Prettier
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - apps/mobile/**
      - packages/**
  pull_request:
    paths:
      - apps/mobile/**
      - packages/**
      - .github/workflows/mobile-prettier.yml

jobs:
  prettier:
    permissions:
      checks: write
      contents: read
      pull-requests: read
      statuses: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: ./.github/actions/yarn
        with:
          after-install: 'false'

      # Run prettier check
      - name: Run Prettier check
        run: |
          yarn workspace @safe-global/mobile run prettier
