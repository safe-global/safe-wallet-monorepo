name: Web Happy path on demand tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 3'
  push:
    branches:
      - dev
    paths:
      - apps/web/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    name: Cypress Happy path on demand tests
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/cypress
        with:
          secrets: ${{ toJSON(secrets) }}
          spec: |
            cypress/e2e/happypath/*.cy.js
          group: 'Happy path on demand tests'
          tag: 'happypath'

      - name: Python setup
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install junitparser
        if: always()
        run: |
          pip install junitparser

      - name: Merge JUnit reports for TestRail
        if: always()
        run: |
          junitparser merge --suite-name "Root Suite" --glob "apps/web/reports/junit-*" "apps/web/reports/junit-report.xml"

      - name: TestRail CLI upload results
        if: always()
        run: |
          pip install trcli
          trcli -y \
          -h https://gno.testrail.io/ \
          --project "Safe- Web App" \
          --username ${{ secrets.TESTRAIL_USERNAME }} \
          --password ${{ secrets.TESTRAIL_PASSWORD }} \
          parse_junit \
          --title "Happy Path Automated Tests, branch: ${GITHUB_REF_NAME}" \
          --run-description ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
          -f "apps/web/reports/junit-report.xml"

  notify:
    if: failure() && github.event_name == 'push'
    needs: [e2e]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_DEV_ALERT }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Web happy path tests failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Web Happy Path Tests (E2E) Failed*\n• Branch: `${{ github.ref_name }}`\n• Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n• Author: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
