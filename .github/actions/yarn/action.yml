name: 'Yarn'

description: 'Set up Node.js and install dependencies'

inputs:
  verify_cache:
    description: 'Verify Yarn cache tarball checksums against the lockfile (--check-cache). Slow; reserve for release jobs that publish artifacts.'
    required: false
    default: 'false'
  turbo-token:
    description: 'Turborepo remote cache token (Vercel PAT)'
    required: false
    default: ''
  turbo-team:
    description: 'Turborepo remote cache team slug'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: ./.github/actions/corepack

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.14.0'
        cache: 'yarn'

    - name: Export Turbo remote cache env
      if: inputs.turbo-token != ''
      shell: bash
      run: |
        echo "TURBO_TOKEN=${{ inputs.turbo-token }}" >> "$GITHUB_ENV"
        echo "TURBO_TEAM=${{ inputs.turbo-team }}" >> "$GITHUB_ENV"
        echo "TURBO_REMOTE_ONLY=false" >> "$GITHUB_ENV"

    - name: Restore Yarn Cache
      id: restore-yarn-types
      uses: ./.github/actions/cache-deps
      with:
        mode: restore-yarn

    - name: Echo cache hit
      shell: bash
      run: |
        echo "Yarn cache hit: ${{ steps.restore-yarn-types.outputs.cache-hit-yarn }}"

    - name: Yarn install
      shell: bash
      run: yarn install --immutable ${{ inputs.verify_cache == 'true' && '--check-cache' || '' }}

    - name: Save Yarn Cache
      if: steps.restore-yarn-types.outputs.cache-hit-yarn != 'true' && github.event_name != 'workflow_run' && github.event_name != 'pull_request_target'
      uses: ./.github/actions/cache-deps
      with:
        mode: save-yarn
        key: ${{ steps.restore-yarn-types.outputs.computed-cache-key-yarn }}
