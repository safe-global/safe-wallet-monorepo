appId: ${APP_ID}
tags:
  - walletconnect-dapps
---
# eth_sendTransaction happy path: synthesise a request from the seeded session,
# review, drive the sign tail (real key in the simulator keychain, real staging
# CGW /propose), and assert the safeTxHash was delivered back to the dApp.
# `e2e-wc-response-hash-match` renders only when the delivered JSON-RPC result
# strictly equals the safeTxHash handed off to the confirm flow — this is the
# end-to-end delivery check, not just "the sheet closed".

- runScript:
    file: ../../utils/scripts/defaults.js

- runFlow:
    file: ../../utils/setup/app-start.yml

# Seeded session + owner signer (key in keychain) + biometrics enabled. The
# keychain write is async and can fail — wait for the setup-ready marker.
- tapOn:
    id: 'e2eWcDappsTx'
- extendedWaitUntil:
    visible:
      id: 'e2e-wc-tx-setup-ready'
    timeout: ${output.defaults.wcTxUiTimeout}

# The dApp sends eth_sendTransaction (0.001 ETH transfer fixture).
- tapOn:
    id: 'e2eWcSynthTxRequest'

# Identity-only request sheet (decoded payload comes after Review, by design).
- extendedWaitUntil:
    visible:
      text: 'Transaction request'
    timeout: ${output.defaults.wcTxUiTimeout}
- assertVisible:
    id: 'wc-tx-domain'
- assertVisible: 'Uniswap'

# Review composes the draft (CGW Safe fetch + RPC → allow a generous window).
- extendedWaitUntil:
    visible:
      id: 'wc-tx-review'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'wc-tx-review'

# Confirm screen renders the decoded transfer (signed amount = balance change).
- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: ${output.defaults.wcTxNetworkTimeout}
- assertVisible:
    text: '.*-0\.001.*'

# Sign tail: Continue → review data → Confirm.
- tapOn:
    id: 'sign-transaction-continue-button'
- extendedWaitUntil:
    visible:
      text: '.*Review this transaction data.*'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'review-and-confirm-button'

# Signing + staging /propose round-trip.
- extendedWaitUntil:
    visible:
      text: 'You successfully signed this transaction.'
    timeout: ${output.defaults.wcTxNetworkTimeout}

# Back out to home: signing-success is a native modal and iOS hides everything
# beneath it (including the TestCtrls markers), so the delivery assert must run
# from the home tab.
- tapOn: 'Done'
- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'home-tab'
    timeout: ${output.defaults.wcTxUiTimeout}

# safeTxHash delivered to the dApp (bare hash for eth_sendTransaction).
- assertVisible:
    id: 'e2e-wc-response-hash-match'

# The proposed tx shows up in the queue UI (backed by staging CGW); the fixture
# amount scopes the match to our row rather than any "Send" copy on screen.
- extendedWaitUntil:
    visible:
      id: 'pending-transactions'
    timeout: ${output.defaults.wcTxNetworkTimeout}
- tapOn:
    id: 'pending-transactions'
- extendedWaitUntil:
    visible:
      id: 'pending-tx-list'
    timeout: ${output.defaults.wcTxUiTimeout}
- assertVisible:
    text: '.*0\.001.*'
