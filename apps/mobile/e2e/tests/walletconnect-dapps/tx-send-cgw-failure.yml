appId: ${APP_ID}
tags:
  - walletconnect-dapps
---
# CGW /propose failure (interceptor 500s it). By design the app never answers
# with -32603: the request stays outstanding (retryable) and only backing out
# of review settles it with USER_REJECTED (5000).

- runScript:
    file: ../../utils/scripts/defaults.js

- runFlow:
    file: ../../utils/setup/app-start.yml

- tapOn:
    id: 'e2eWcDappsTx'
- extendedWaitUntil:
    visible:
      id: 'e2e-wc-tx-setup-ready'
    timeout: ${output.defaults.wcTxUiTimeout}

- tapOn:
    id: 'e2eWcArmProposeFailure'
- tapOn:
    id: 'e2eWcSynthTxRequest'

- extendedWaitUntil:
    visible:
      text: 'Transaction request'
    timeout: ${output.defaults.wcTxUiTimeout}
- extendedWaitUntil:
    visible:
      id: 'wc-tx-review'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'wc-tx-review'

- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: ${output.defaults.wcTxNetworkTimeout}
- tapOn:
    id: 'sign-transaction-continue-button'
- extendedWaitUntil:
    visible:
      text: '.*Review this transaction data.*'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'review-and-confirm-button'

# Signing succeeds locally; /propose 500s → error screen.
- extendedWaitUntil:
    visible:
      text: "Couldn't sign the transaction"
    timeout: ${output.defaults.wcTxNetworkTimeout}

# Closing the error modal lands back on review-and-confirm with Confirm still
# live — retryability is the observable "not answered yet" contract (markers are
# hidden under modals; the ordering itself is unit-tested in walletKitListeners).
- tapOn: 'Close'
- extendedWaitUntil:
    visible:
      id: 'review-and-confirm-button'
    timeout: ${output.defaults.wcTxUiTimeout}

# Backing out of review settles the dApp with USER_REJECTED.
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'sign-transaction-continue-button'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'home-tab'
    timeout: ${output.defaults.wcTxUiTimeout}

- extendedWaitUntil:
    visible:
      id: 'e2e-wc-response-error-5000'
    timeout: ${output.defaults.wcTxUiTimeout}
