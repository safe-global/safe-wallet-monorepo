appId: ${APP_ID}
tags:
  - walletconnect-dapps
---
# CGW /propose failure: the e2e fetch interceptor 500s the propose call. By
# design the app does NOT answer the dApp with -32603 (see methodRouter's
# reserved-code note): the signing-error screen shows, the request stays
# outstanding (retryable), and only backing out of review settles it with
# USER_REJECTED (5000). This flow asserts that actual contract.

- runScript:
    file: ../../utils/scripts/defaults.js

- runFlow:
    file: ../../utils/setup/app-start.yml

- tapOn:
    id: 'e2eWcDappsTx'
- extendedWaitUntil:
    visible:
      id: 'e2e-wc-tx-setup-ready'
    timeout: ${output.defaults.wcTxUiTimeout}

# Arm the propose interceptor, then request.
- tapOn:
    id: 'e2eWcArmProposeFailure'
- tapOn:
    id: 'e2eWcSynthTxRequest'

- extendedWaitUntil:
    visible:
      text: 'Transaction request'
    timeout: ${output.defaults.wcTxUiTimeout}
- extendedWaitUntil:
    visible:
      id: 'wc-tx-review'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'wc-tx-review'

- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: ${output.defaults.wcTxNetworkTimeout}
- tapOn:
    id: 'sign-transaction-continue-button'
- extendedWaitUntil:
    visible:
      text: '.*Review this transaction data.*'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'review-and-confirm-button'

# Signing succeeds locally; /propose 500s → error screen.
- extendedWaitUntil:
    visible:
      text: "Couldn't sign the transaction"
    timeout: ${output.defaults.wcTxNetworkTimeout}

# The request is retained for retry: closing the (modal) error screen lands back
# on review-and-confirm with the Confirm button still live. A direct "no response
# yet" marker assert is impossible here — markers are hidden under modals/pushed
# screens — so retryability is the observable contract, and the
# no-response-until-abandon ordering is covered by walletKitListeners unit tests.
- tapOn: 'Close'
- extendedWaitUntil:
    visible:
      id: 'review-and-confirm-button'
    timeout: ${output.defaults.wcTxUiTimeout}

# Back out of the review flow entirely; abandoning settles the dApp with USER_REJECTED.
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'sign-transaction-continue-button'
    timeout: ${output.defaults.wcTxUiTimeout}
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'home-tab'
    timeout: ${output.defaults.wcTxUiTimeout}

- extendedWaitUntil:
    visible:
      id: 'e2e-wc-response-error-5000'
    timeout: ${output.defaults.wcTxUiTimeout}
