appId: ${APP_ID}
tags:
  - walletconnect-dapps
  - suite
---
# WalletConnect dApps pairing & session-approval suite. Each flow calls
# resetReduxForE2E (via e2eWcDappsBase) before seeding, so ordering is
# presentation-only — flows are independent.

- runFlow:
    file: ./pair-scan-happy.yml

- runFlow:
    file: ./pair-scan-invalid.yml

- runFlow:
    file: ./pair-scan-timeout.yml

- runFlow:
    file: ./pair-deep-link.yml

- runFlow:
    file: ./pair-proposal-reject.yml

- runFlow:
    file: ./pair-proposal-unverified.yml

- runFlow:
    file: ./pair-proposal-scam.yml

- runFlow:
    file: ./manage-entry-hidden-when-empty.yml

- runFlow:
    file: ./manage-entry-visible.yml

- runFlow:
    file: ./manage-disconnect-via-menu.yml

- runFlow:
    file: ./manage-disconnect-via-swipe.yml

- runFlow:
    file: ./manage-disconnect-cancel.yml

- runFlow:
    file: ./manage-disconnect-from-dapp.yml
