appId: ${APP_ID}
tags:
  - walletconnect-dapps
---
# wallet_sendCalls (EIP-5792) batch of two calls: both calls render in the
# actions list of the confirm screen (the request sheet is identity-only by
# design), and after signing the dApp receives the bundle envelope
# `{ id: safeTxHash }` — `e2e-wc-response-5792-match` renders only when the
# result is exactly that shape with the handed-off hash.

- runFlow:
    file: ../../utils/setup/app-start.yml

- tapOn:
    id: 'e2eWcDappsTx'
- assertVisible:
    id: 'home-tab'

# The dApp sends a wallet_sendCalls bundle with two calls.
- tapOn:
    id: 'e2eWcSynthTxBatch'
- extendedWaitUntil:
    visible:
      text: 'Transaction request'
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: 'wc-tx-review'
    timeout: 10000
- tapOn:
    id: 'wc-tx-review'

# Confirm screen: the multisend draft exposes an Actions row with both calls.
- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: 'actions-row'
    timeout: 10000
- tapOn:
    id: 'actions-row'
- extendedWaitUntil:
    visible:
      id: 'tx-action-item-0'
    timeout: 10000
- assertVisible:
    id: 'tx-action-item-1'
- assertNotVisible:
    id: 'tx-action-item-2'
- tapOn:
    id: 'go-back'

# Sign tail (same as the happy path).
- extendedWaitUntil:
    visible:
      id: 'sign-transaction-continue-button'
    timeout: 10000
- tapOn:
    id: 'sign-transaction-continue-button'
- extendedWaitUntil:
    visible:
      text: '.*Review this transaction data.*'
    timeout: 10000
- tapOn:
    id: 'review-and-confirm-button'
- extendedWaitUntil:
    visible:
      text: 'You successfully signed this transaction.'
    timeout: 30000

# Markers are invisible while the success modal is up (see README); assert from home.
- tapOn: 'Done'
- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: 10000
- tapOn:
    id: 'go-back'
- extendedWaitUntil:
    visible:
      id: 'home-tab'
    timeout: 10000

# EIP-5792 response shape { id: safeTxHash } asserted explicitly.
- assertVisible:
    id: 'e2e-wc-response-5792-match'
