appId: ${APP_ID}
tags:
  - walletconnect-dapps
---
# Reject on the sheet → the dApp gets USER_REJECTED (code 5000), surfaced as a marker.

- runScript:
    file: ../../utils/scripts/defaults.js

- runFlow:
    file: ../../utils/setup/app-start.yml

- tapOn:
    id: 'e2eWcDappsTx'
- extendedWaitUntil:
    visible:
      id: 'e2e-wc-tx-setup-ready'
    timeout: ${output.defaults.wcTxUiTimeout}

- tapOn:
    id: 'e2eWcSynthTxRequest'
- extendedWaitUntil:
    visible:
      text: 'Transaction request'
    timeout: ${output.defaults.wcTxUiTimeout}

- tapOn:
    id: 'wc-tx-reject'

# USER_REJECTED delivered to the dApp; sheet gone.
- extendedWaitUntil:
    visible:
      id: 'e2e-wc-response-error-5000'
    timeout: ${output.defaults.wcTxUiTimeout}
- assertNotVisible:
    text: 'Transaction request'
