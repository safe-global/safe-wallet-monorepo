appId: ${APP_ID}
tags:
  - transactions
  - draft-editors
---
# Approval editor: e2eApprovalDraft composes a multiSend (COW approve + call) and
# opens the confirm screen — the editor only renders for drafts. Editing the amount
# and toggling unlimited each rebuild the draft; nothing is signed or proposed.

- runScript:
    file: ../../../utils/scripts/defaults.js

- runFlow:
    file: ../../../utils/setup/app-start.yml

# Compose is async (SDK init + CGW fetch) — gate on the ready marker.
- tapOn:
    id: 'e2eApprovalDraft'
- extendedWaitUntil:
    visible:
      id: 'e2e-draft-setup-ready'
    timeout: ${output.defaults.draftNetworkTimeout}

- extendedWaitUntil:
    visible:
      text: 'Confirm transaction'
    timeout: ${output.defaults.draftUiTimeout}
- extendedWaitUntil:
    visible:
      id: 'approval-editor'
    timeout: ${output.defaults.draftNetworkTimeout}
# Pill reads "<amount> COW"; the decimal separator is locale-dependent.
- assertVisible:
    text: '.*1[.,]5 COW.*'

# centerElement so the button clears the pinned Continue footer (which otherwise
# overlaps it and absorbs the tap).
- scrollUntilVisible:
    element:
      id: 'edit-approval-button'
    direction: DOWN
    centerElement: true
- tapOn:
    id: 'edit-approval-button'
- extendedWaitUntil:
    visible:
      id: 'input-approval-amount'
    timeout: ${output.defaults.draftUiTimeout}
- tapOn:
    id: 'input-approval-amount'
- eraseText
- inputText: '2.5'
- tapOn:
    id: 'save-approval-button'

- extendedWaitUntil:
    visible:
      id: 'approval-editor'
    timeout: ${output.defaults.draftNetworkTimeout}
- extendedWaitUntil:
    visible:
      text: '.*2[.,]5 COW.*'
    timeout: ${output.defaults.draftNetworkTimeout}
# Verify the rebuilt action carries the edited amount (2.5 COW = 2.5e18 wei).
- runFlow:
    file: ../../../utils/components/draft-editors/verify-approve-amount.yml
    env:
      EXPECTED_APPROVAL_VALUE: '2500000000000000000'

- scrollUntilVisible:
    element:
      id: 'edit-approval-button'
    direction: DOWN
    centerElement: true
- tapOn:
    id: 'edit-approval-button'
- extendedWaitUntil:
    visible:
      id: 'switch-unlimited-approval'
    timeout: ${output.defaults.draftUiTimeout}
- tapOn:
    id: 'switch-unlimited-approval'
- tapOn:
    id: 'save-approval-button'
- extendedWaitUntil:
    visible:
      text: 'Unlimited'
    timeout: ${output.defaults.draftNetworkTimeout}
# Verify the rebuilt action carries the unlimited amount (2^256 - 1 wei).
- runFlow:
    file: ../../../utils/components/draft-editors/verify-approve-amount.yml
    env:
      EXPECTED_APPROVAL_VALUE: '115792089237316195423570985008687907853269984665640564039457584007913129639935'
